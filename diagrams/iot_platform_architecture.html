
<div id="mermaid-container" style="padding: 1rem 0;"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2C2C2A' : '#F1EFE8',
    primaryBorderColor: dark ? '#5F5E5A' : '#5F5E5A',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    secondaryColor: dark ? '#26215C' : '#EEEDFE',
    tertiaryColor: dark ? '#04342C' : '#E1F5EE',
  },
});

const diagram = `
flowchart TD
    JWT[🔑 JWT] --> CLIENT
    IOT[IoT] --> API_GW
    CLIENT --> KEYCLOAK[Keycloak]
    CLIENT --> API_GW[API Gateway]
    API_GW --> DEVICE_SVC[Device Service]
    API_GW --> USER_SVC[User Service]
    API_GW --> INGEST[Ingestion Service]
    API_GW --> INSIGHT[Insight Service]
    INGEST <--> KAFKA1[Kafka]
    KAFKA1 --> USAGE[Usage Service]
    INSIGHT --> AI[AI]
    INSIGHT -.-> USAGE
    KAFKA1 -.-> USER_SVC
    USAGE -.-> USER_SVC
    USAGE -.-> DEVICE_SVC
    USAGE --> TSDB[(Timeseries DB)]
    USAGE --> KAFKA2[Kafka]
    DEVICE_SVC <-.-> MYSQL[(MySQL)]
    USER_SVC --> MYSQL
    KAFKA2 --> ALERT[Alert Service]
    ALERT --> API_GW
`;

const { svg } = await mermaid.render('arch-svg', diagram);
document.getElementById('mermaid-container').innerHTML = svg;
</script>
